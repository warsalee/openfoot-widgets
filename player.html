

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Openfoot — Player Passport</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.4/chart.umd.min.js"></script>
<style>
  :root{
    --brand:#3FFECA;
    --brand-dim:rgba(63,254,202,.55);
    --brand-soft:rgba(63,254,202,.12);
    --bg:#07100A;
    --surface:#0E1B14;
    --surface-2:#142519;
    --surface-3:#1A2E20;
    --border:rgba(63,254,202,.14);
    --border-strong:rgba(63,254,202,.28);
    --text:#EAF7F1;
    --text-muted:#8CA89A;
    --text-dim:#5C7568;
    --warn:#FFB84D;
    --danger:#FF6B6B;
    --blue:#8FC6FF;
    --violet:#C9A6FF;
    --amber:#FFC97A;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
  }
  .display{font-family:'Space Grotesk','Inter',sans-serif;}

  /* ---------- HEADER ---------- */
  header.brand-header{
    background:linear-gradient(180deg,#0A1710 0%,var(--bg) 100%);
    border-bottom:1px solid var(--border);
    padding:22px 20px 20px;
    position:sticky;
    top:0;
    z-index:5;
  }
  .brand-row{
    display:flex;
    align-items:center;
    gap:10px;
    max-width:560px;
    margin:0 auto 18px;
  }
  .brand-mark{
    width:30px;height:30px;
    border-radius:8px;
    background:var(--brand);
    display:flex;align-items:center;justify-content:center;
    flex-shrink:0;
  }
  .brand-mark svg{width:17px;height:17px;}
  .brand-name{
    font-family:'Space Grotesk',sans-serif;
    font-weight:700;
    font-size:15px;
    letter-spacing:.04em;
    color:var(--text);
    text-transform:uppercase;
  }
  .brand-tag{
    margin-left:auto;
    font-size:11px;
    font-weight:600;
    letter-spacing:.06em;
    text-transform:uppercase;
    color:var(--brand);
    background:var(--brand-soft);
    border:1px solid var(--border-strong);
    padding:4px 9px;
    border-radius:100px;
  }

  .player-id-card{
    max-width:560px;
    margin:0 auto;
    display:flex;
    align-items:center;
    gap:14px;
  }
  .player-avatar{
    width:56px;height:56px;
    border-radius:14px;
    background:var(--surface-2);
    border:1px solid var(--border-strong);
    display:flex;align-items:center;justify-content:center;
    font-family:'Space Grotesk',sans-serif;
    font-weight:700;
    font-size:20px;
    color:var(--brand);
    flex-shrink:0;
  }
  .player-info{min-width:0;flex:1;}
  .player-name{
    font-family:'Space Grotesk',sans-serif;
    font-weight:700;
    font-size:22px;
    line-height:1.15;
    margin:0 0 4px;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .player-meta{
    display:flex;
    flex-wrap:wrap;
    gap:6px 10px;
    font-size:12.5px;
    color:var(--text-muted);
  }
  .player-meta span.sep{color:var(--text-dim);}
  .player-meta .pid{
    font-family:'Space Grotesk',sans-serif;
    color:var(--brand);
    font-weight:600;
    letter-spacing:.02em;
  }
  .flag-pill{
    font-size:10.5px;
    font-weight:700;
    text-transform:uppercase;
    letter-spacing:.04em;
    padding:2px 7px;
    border-radius:100px;
  }
  .flag-pill.warn{background:rgba(255,184,77,.14);color:var(--warn);border:1px solid rgba(255,184,77,.3);}
  .flag-pill.danger{background:rgba(255,107,107,.14);color:var(--danger);border:1px solid rgba(255,107,107,.3);}

  .hero-score{
    text-align:right;
    flex-shrink:0;
  }
  .hero-score .val{
    font-family:'Space Grotesk',sans-serif;
    font-weight:700;
    font-size:30px;
    color:var(--brand);
    line-height:1;
  }
  .hero-score .lbl{
    font-size:10.5px;
    color:var(--text-muted);
    text-transform:uppercase;
    letter-spacing:.06em;
    margin-top:3px;
  }

  /* ---------- MAIN ---------- */
  main{
    max-width:560px;
    margin:0 auto;
    padding:22px 16px 60px;
  }
  .section-heading{
    font-family:'Space Grotesk',sans-serif;
    font-size:13px;
    font-weight:600;
    letter-spacing:.08em;
    text-transform:uppercase;
    color:var(--text-muted);
    margin:0 0 12px 4px;
  }

  /* ---------- CHART CARD ---------- */
  .chart-card{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:16px;
    padding:18px 14px 14px;
    margin-bottom:28px;
  }
  .chart-legend{
    display:flex;
    flex-wrap:wrap;
    gap:14px;
    padding:0 4px 14px;
    font-size:12px;
    color:var(--text-muted);
  }
  .chart-legend .item{display:flex;align-items:center;gap:6px;}
  .chart-legend .swatch{width:9px;height:9px;border-radius:3px;flex-shrink:0;}
  .chart-wrap{position:relative;height:210px;}

  /* ---------- ACCORDION ---------- */
  .session-card{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:16px;
    margin-bottom:12px;
    overflow:hidden;
  }
  .session-card[data-open="true"]{border-color:var(--border-strong);}
  .session-head{
    width:100%;
    background:none;
    border:none;
    padding:15px 16px;
    display:flex;
    align-items:center;
    gap:12px;
    cursor:pointer;
    color:inherit;
    text-align:left;
    font-family:inherit;
  }
  .session-head:active{background:var(--surface-2);}
  .session-head-main{flex:1;min-width:0;}
  .session-head-top{
    display:flex;
    align-items:center;
    flex-wrap:wrap;
    gap:5px 8px;
    font-size:13.5px;
    font-weight:600;
  }
  .session-head-top .sep{color:var(--text-dim);font-weight:400;}
  .session-head-sub{
    margin-top:3px;
    font-size:12px;
    color:var(--text-muted);
    display:flex;
    gap:8px;
    flex-wrap:wrap;
  }
  .session-score{
    text-align:center;
    flex-shrink:0;
    background:var(--surface-2);
    border:1px solid var(--border);
    border-radius:12px;
    padding:6px 12px;
    min-width:56px;
  }
  .session-score .v{
    font-family:'Space Grotesk',sans-serif;
    font-weight:700;
    font-size:17px;
    color:var(--brand);
    line-height:1.1;
  }
  .session-score .l{
    font-size:9px;
    color:var(--text-muted);
    text-transform:uppercase;
    letter-spacing:.05em;
  }
  .chevron{
    flex-shrink:0;
    width:18px;height:18px;
    color:var(--text-muted);
    transition:transform .2s ease;
  }
  .session-card[data-open="true"] .chevron{transform:rotate(180deg);color:var(--brand);}

  .session-body{
    max-height:0;
    overflow:hidden;
    transition:max-height .25s ease;
  }
  .session-body-inner{
    padding:2px 16px 18px;
    border-top:1px solid var(--border);
  }

  .stat-section{margin-top:16px;}
  .stat-section-title{
    font-size:11.5px;
    font-weight:700;
    text-transform:uppercase;
    letter-spacing:.06em;
    color:var(--brand);
    margin:0 0 9px;
    display:flex;
    align-items:center;
    gap:6px;
  }
  .stat-section-title .pillar-avg{
    margin-left:auto;
    color:var(--text-muted);
    font-weight:600;
    letter-spacing:0;
    text-transform:none;
    font-size:11.5px;
  }

  .stat-grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:8px;
  }
  .stat-chip{
    background:var(--surface-2);
    border:1px solid var(--border);
    border-radius:10px;
    padding:8px 10px;
  }
  .stat-chip .lbl{
    font-size:10.5px;
    color:var(--text-muted);
    margin-bottom:2px;
  }
  .stat-chip .val{
    font-family:'Space Grotesk',sans-serif;
    font-size:14.5px;
    font-weight:600;
  }

  .score-chip{
    background:var(--surface-2);
    border:1px solid var(--border);
    border-radius:10px;
    padding:8px 10px;
  }
  .score-chip-row{
    display:flex;
    justify-content:space-between;
    font-size:11.5px;
    margin-bottom:5px;
  }
  .score-chip-row .n{color:var(--text-muted);}
  .score-chip-row .v{font-weight:700;font-family:'Space Grotesk',sans-serif;}
  .score-bar{
    height:5px;
    background:var(--surface-3);
    border-radius:100px;
    overflow:hidden;
  }
  .score-bar-fill{
    height:100%;
    background:var(--brand);
    border-radius:100px;
  }

  .tips-overview{
    display:flex;
    gap:10px;
    margin-top:4px;
  }
  .tips-pillar{
    flex:1;
    background:var(--surface-2);
    border:1px solid var(--border);
    border-radius:12px;
    padding:12px 8px;
    text-align:center;
  }
  .tips-pillar .letter{
    font-family:'Space Grotesk',sans-serif;
    font-size:11px;
    font-weight:700;
    letter-spacing:.05em;
    margin-bottom:4px;
  }
  .tips-pillar .letter.T{color:var(--blue);}
  .tips-pillar .letter.I{color:var(--violet);}
  .tips-pillar .letter.S{color:var(--amber);}
  .tips-pillar .n{
    font-family:'Space Grotesk',sans-serif;
    font-size:18px;
    font-weight:700;
  }
  .tips-pillar .name{font-size:9.5px;color:var(--text-muted);margin-top:1px;}

  .radar-legend{
    display:flex;
    gap:16px;
    justify-content:center;
    margin-top:2px;
    font-size:10.5px;
    color:var(--text-muted);
  }
  .radar-legend .item{display:flex;align-items:center;gap:5px;}
  .radar-legend .swatch{width:8px;height:8px;border-radius:2px;flex-shrink:0;}
  .radar-wrap{position:relative;height:190px;margin-top:6px;}

  /* ---------- YOUR DEVELOPMENT ---------- */
  .dev-empty{text-align:center;padding:26px 10px 14px;}
  .dev-empty svg{width:30px;height:30px;color:var(--brand-dim);margin-bottom:12px;}
  .dev-empty-title{
    font-family:'Space Grotesk',sans-serif;
    font-weight:600;
    font-size:15px;
    margin:0 0 8px;
    color:var(--text);
  }
  .dev-empty-sub{
    font-size:12.5px;
    line-height:1.6;
    color:var(--text-muted);
    max-width:340px;
    margin:0 auto 12px;
  }
  .dev-empty-progress{
    display:inline-block;
    font-size:11px;
    font-weight:600;
    color:var(--brand);
    background:var(--brand-soft);
    border:1px solid var(--border-strong);
    padding:4px 11px;
    border-radius:100px;
  }
  .dev-metric{margin-top:20px;}
  .dev-metric:first-child{margin-top:2px;}
  .dev-metric-head{
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    gap:8px;
    margin-bottom:6px;
    padding:0 4px;
  }
  .dev-metric-title{font-size:13px;font-weight:600;color:var(--text);}
  .dev-metric-sub{font-size:10.5px;color:var(--text-muted);text-align:right;}
  .dev-flag-note{
    font-size:10.5px;
    color:var(--warn);
    margin:6px 4px 0;
  }
  .chart-wrap.small{height:165px;}

  .note-block{
    margin-top:16px;
    background:var(--surface-2);
    border:1px solid var(--border);
    border-left:3px solid var(--brand-dim);
    border-radius:10px;
    padding:12px 13px;
  }
  .note-block.priority{border-left-color:var(--warn);}
  .note-block .k{
    font-size:10.5px;
    font-weight:700;
    text-transform:uppercase;
    letter-spacing:.06em;
    color:var(--text-muted);
    margin-bottom:5px;
    display:block;
  }
  .note-block.priority .k{color:var(--warn);}
  .note-block p{
    margin:0;
    font-size:13px;
    line-height:1.5;
    color:var(--text);
  }

  .empty-state, .loading-state{
    text-align:center;
    padding:70px 20px;
    color:var(--text-muted);
    font-size:14px;
  }
  .loading-state .spinner{
    width:26px;height:26px;
    border-radius:50%;
    border:2.5px solid var(--surface-3);
    border-top-color:var(--brand);
    margin:0 auto 14px;
    animation:spin .8s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg);}}

  footer{
    max-width:560px;
    margin:0 auto;
    padding:6px 20px 30px;
    text-align:center;
    color:var(--text-dim);
    font-size:11px;
    line-height:1.6;
  }
  footer .fmark{color:var(--brand-dim);font-weight:600;}
</style>
</head>
<body>

<header class="brand-header">
  <div class="brand-row">
    <div class="brand-mark">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2L20 6.5V13.5C20 18 16.5 21.2 12 22C7.5 21.2 4 18 4 13.5V6.5L12 2Z" fill="#07100A"/>
        <path d="M12 6.5L9 9.5V13L12 15L15 13V9.5L12 6.5Z" fill="#3FFECA"/>
      </svg>
    </div>
    <span class="brand-name">Openfoot</span>
    <span class="brand-tag">Passport</span>
  </div>

  <div class="player-id-card" id="playerHeader" style="display:none;">
    <div class="player-avatar" id="avatarInitial">–</div>
    <div class="player-info">
      <p class="player-name" id="playerName">—</p>
      <div class="player-meta" id="playerMeta"></div>
    </div>
    <div class="hero-score">
      <div class="val" id="heroScore">—</div>
      <div class="lbl">Latest TIPS</div>
    </div>
  </div>
</header>

<main>
  <div id="loadingState" class="loading-state">
    <div class="spinner"></div>
    Loading player passport…
  </div>

  <div id="emptyState" class="empty-state" style="display:none;"></div>

  <div id="content" style="display:none;">
    <p class="section-heading">TIPS Progression</p>
    <div class="chart-card">
      <div class="chart-legend" id="chartLegend"></div>
      <div class="chart-wrap"><canvas id="tipsChart"></canvas></div>
    </div>

    <p class="section-heading">Your Development</p>
    <div class="chart-card" id="devCard"></div>

    <p class="section-heading">Sessions</p>
    <div id="sessionList"></div>
  </div>
</main>

<footer>
  Openfoot Player Passport · TIPS framework inspired by the work of Ajax, adapted to Openfoot's context.<br>
  <span class="fmark">T</span>echnique · <span class="fmark">I</span>nsight · <span class="fmark">P</span>ersonality · <span class="fmark">S</span>peed
</footer>

<script>
(function(){
  "use strict";

  // ---------------------------------------------------------------
  // CONFIG
  // ---------------------------------------------------------------
  var SHEET_ID = "1NWW6oiUrYKFtOqGSeotlhy8kqwwK5mRcssbSXpOn4bo";
  var TAB_NAME = "PM Session Data";
  var ID_FILTER_PREFIX = "TF-";

  // 0-indexed column map, derived directly from the live header row
  // (row 5 = group labels, row 6 = column headers, data from row 7... in
  // 1-indexed sheet terms this is header row 5, data starting row 6).
  var COL = {
    session:0, date:1, playerId:2, playerName:3, positionPlayed:4, team:5,
    positionChange:6, injuryFlag:7, primaryPosition:8,
    touches:9, touchesPerMin:10, leftPct:11, rightPct:12, bilateral:13,
    oneTouchPct:14, shortAvgS:15, longAvgS:16,
    ctrlReleasePct:17, maxRV:18, rvZ1:19, rvZ2:20, rvZ3:21, rvZ4:22, rvZ5:23,
    rvZ6:24, driftRatio:25, release1H:26, release2H:27,
    crossFootPct:28, codIntelPct:29, dirAsymPct:30, tactEcoM:31,
    totalDistM:32, topSpeed:33, workRate:34, hsc:35, sprints:36, strideAsymPct:37,
    gaitFlag:38, gaitContext:39,
    ballControl:40, passing:41, receiving:42, dribbling:43, finishing:44,
    bothFeet:45, tAvg:46,
    scanning:47, decisionSpeed:48, spatialPlay:49, positioning:50, iAvg:51,
    speed:52, agility:53, endurance:54, recovery:55, sAvg:56,
    tipsScore:57, sessionNote:58, devPriority:59,
    succPasses:60, passCompletionPct:61, lostPossessions:62, regains:63,
    shortPossessions:64, shortPossPct:65, longPossessions:66, longPossPct:67,
    accZone6:68, receives:69, rvAvg:70
  };

  // ---------------------------------------------------------------
  // UTIL
  // ---------------------------------------------------------------
  function qs(name){
    var m = new URLSearchParams(window.location.search).get(name);
    return m ? m.trim() : null;
  }

  function isNum(v){ return typeof v === "number" && isFinite(v); }

  function n1(v){ return isNum(v) ? v.toFixed(1) : "—"; }
  function n0(v){ return isNum(v) ? Math.round(v).toString() : "—"; }
  function pct1(v){ return isNum(v) ? v.toFixed(1) + "%" : "—"; }

  function isBlank(v){
    return v === null || v === undefined || v === "" ||
      (typeof v === "string" && (v.trim() === "" || v.trim() === "—"));
  }

  function parseSheetDate(raw){
    if (isBlank(raw)) return null;
    if (typeof raw === "string" && raw.indexOf("Date(") === 0){
      var m = raw.match(/Date\((\d+),(\d+),(\d+)/);
      if (m) return new Date(+m[1], +m[2], +m[3]);
    }
    if (typeof raw === "string"){
      var parts = raw.split("/");
      if (parts.length === 3){
        var d = +parts[0], mo = +parts[1], y = +parts[2];
        if (d && mo && y) return new Date(y, mo - 1, d);
      }
    }
    var fallback = new Date(raw);
    return isNaN(fallback.getTime()) ? null : fallback;
  }

  function formatDate(dt){
    if (!dt) return "—";
    var months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    return dt.getDate() + " " + months[dt.getMonth()] + " " + dt.getFullYear();
  }

  function esc(s){
    if (s === null || s === undefined) return "";
    return String(s).replace(/[&<>"']/g, function(c){
      return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c];
    });
  }

  function avg(arr){
    return arr.length ? arr.reduce(function(a,b){ return a+b; }, 0) / arr.length : null;
  }

  function sessionLabel(s){
    return (s.session || "") + (s.date ? " · " + formatDate(s.date).replace(/ \d{4}$/, "") : "");
  }

  // Per-session squad cohort averages (T/I/S), built from every TF- player's
  // row for that session — used as the "team" comparison in the radar chart.
  function computeSessionAverages(allSessions){
    var groups = {};
    allSessions.forEach(function(s){
      if (!s.session) return;
      if (!groups[s.session]) groups[s.session] = { tAvg: [], iAvg: [], sAvg: [] };
      if (isNum(s.tAvg)) groups[s.session].tAvg.push(s.tAvg);
      if (isNum(s.iAvg)) groups[s.session].iAvg.push(s.iAvg);
      if (isNum(s.sAvg)) groups[s.session].sAvg.push(s.sAvg);
    });
    var out = {};
    Object.keys(groups).forEach(function(k){
      var g = groups[k];
      out[k] = { tAvg: avg(g.tAvg), iAvg: avg(g.iAvg), sAvg: avg(g.sAvg), n: g.tAvg.length };
    });
    return out;
  }

  // ---------------------------------------------------------------
  // JSONP LOADER (Google Visualization API)
  // ---------------------------------------------------------------
  function loadSheet(callback, onError){
    var url = "https://docs.google.com/spreadsheets/d/" + SHEET_ID +
      "/gviz/tq?tqx=out:json&headers=0&sheet=" + encodeURIComponent(TAB_NAME);

    window.google = window.google || {};
    window.google.visualization = window.google.visualization || {};
    window.google.visualization.Query = window.google.visualization.Query || {};
    window.google.visualization.Query.setResponse = function(json){ callback(json); };

    var script = document.createElement("script");
    script.src = url;
    script.onerror = function(){ onError && onError(); };
    document.body.appendChild(script);
  }

  // ---------------------------------------------------------------
  // PARSE
  // ---------------------------------------------------------------
  function rowToArray(row){
    if (!row || !row.c) return [];
    return row.c.map(function(cell){ return cell ? cell.v : null; });
  }

  function parseTable(json){
    if (!json || !json.table || !json.table.rows) return [];
    var rawRows = json.table.rows.map(rowToArray);

    // Locate the real header row (label 'Player ID' in column index 2)
    // rather than assuming a fixed offset — more robust to sheet edits.
    var headerIdx = -1;
    for (var i = 0; i < rawRows.length; i++){
      if (rawRows[i][COL.playerId] === "Player ID"){ headerIdx = i; break; }
    }
    var dataRows = headerIdx >= 0 ? rawRows.slice(headerIdx + 1) : rawRows.slice(5);

    var sessions = [];
    dataRows.forEach(function(row){
      var pid = row[COL.playerId];
      if (isBlank(pid) || typeof pid !== "string" || pid.indexOf(ID_FILTER_PREFIX) !== 0) return;

      var note = row[COL.sessionNote];
      var priority = row[COL.devPriority];
      var endurance = row[COL.endurance];
      var recovery = row[COL.recovery];

      // Data-entry quirk in early sessions (S002/S003): Session Note and
      // Dev Priority text was entered into the Endurance/Recovery cells
      // instead of their own columns, which sit empty for those rows.
      if (isBlank(note) && typeof endurance === "string" && endurance.length > 8){
        note = endurance;
        priority = recovery;
        endurance = null;
        recovery = null;
      }

      sessions.push({
        session: row[COL.session],
        date: parseSheetDate(row[COL.date]),
        playerId: pid,
        playerName: row[COL.playerName],
        positionPlayed: row[COL.positionPlayed],
        team: row[COL.team],
        positionChange: row[COL.positionChange],
        injuryFlag: row[COL.injuryFlag],
        primaryPosition: row[COL.primaryPosition],

        touches: row[COL.touches], touchesPerMin: row[COL.touchesPerMin],
        leftPct: row[COL.leftPct], rightPct: row[COL.rightPct],
        bilateral: row[COL.bilateral], oneTouchPct: row[COL.oneTouchPct],
        ctrlReleasePct: row[COL.ctrlReleasePct], maxRV: row[COL.maxRV],
        rvAvg: row[COL.rvAvg], driftRatio: row[COL.driftRatio],
        release1H: row[COL.release1H], release2H: row[COL.release2H],
        crossFootPct: row[COL.crossFootPct],

        codIntelPct: row[COL.codIntelPct], dirAsymPct: row[COL.dirAsymPct],
        tactEcoM: row[COL.tactEcoM],
        scanning: row[COL.scanning], decisionSpeed: row[COL.decisionSpeed],
        spatialPlay: row[COL.spatialPlay], positioning: row[COL.positioning],
        iAvg: row[COL.iAvg],

        ballControl: row[COL.ballControl], passing: row[COL.passing],
        receiving: row[COL.receiving], dribbling: row[COL.dribbling],
        finishing: row[COL.finishing], bothFeet: row[COL.bothFeet],
        tAvg: row[COL.tAvg],

        totalDistM: row[COL.totalDistM], topSpeed: row[COL.topSpeed],
        workRate: row[COL.workRate], hsc: row[COL.hsc], sprints: row[COL.sprints],
        strideAsymPct: row[COL.strideAsymPct], gaitFlag: row[COL.gaitFlag],
        gaitContext: row[COL.gaitContext],
        speed: row[COL.speed], agility: row[COL.agility],
        endurance: endurance, recovery: recovery, sAvg: row[COL.sAvg],

        tipsScore: row[COL.tipsScore],
        sessionNote: note,
        devPriority: priority
      });
    });

    return sessions;
  }

  // ---------------------------------------------------------------
  // RENDER
  // ---------------------------------------------------------------
  function statChip(label, value){
    return '<div class="stat-chip"><div class="lbl">' + esc(label) +
      '</div><div class="val">' + esc(value) + '</div></div>';
  }

  function scoreChip(label, value){
    var v = isNum(value) ? value : 0;
    var pct = Math.max(0, Math.min(100, (v / 10) * 100));
    return '<div class="score-chip">' +
      '<div class="score-chip-row"><span class="n">' + esc(label) +
      '</span><span class="v">' + n1(value) + '</span></div>' +
      '<div class="score-bar"><div class="score-bar-fill" style="width:' + pct + '%"></div></div>' +
      '</div>';
  }

  function tipsPillar(letter, value, name){
    return '<div class="tips-pillar"><div class="letter ' + letter + '">' + letter +
      '</div><div class="n">' + n1(value) + '</div><div class="name">' + esc(name) + '</div></div>';
  }

  function buildSessionCard(s, isOpen, index){
    var flags = [];
    if (!isBlank(s.injuryFlag) && ["—","NO"].indexOf(s.injuryFlag) === -1){
      flags.push('<span class="flag-pill danger">' + esc(s.injuryFlag) + '</span>');
    }
    if (!isBlank(s.positionChange) && ["—","NO"].indexOf(s.positionChange) === -1){
      flags.push('<span class="flag-pill warn">Pos change</span>');
    }

    var body =
      '<div class="stat-section">' +
        '<h4 class="stat-section-title">Ball Mastery</h4>' +
        '<div class="stat-grid">' +
          statChip("Touches", n0(s.touches)) +
          statChip("Touches / min", n1(s.touchesPerMin)) +
          statChip("Left / Right foot", (isNum(s.leftPct) ? n0(s.leftPct)+"%" : "—") + " / " + (isNum(s.rightPct) ? n0(s.rightPct)+"%" : "—")) +
          statChip("One-Touch %", pct1(s.oneTouchPct)) +
          statChip("Control on Release %", pct1(s.ctrlReleasePct)) +
          statChip("Cross-Foot %", pct1(s.crossFootPct)) +
          statChip("Max Release Velocity", isNum(s.maxRV) ? n1(s.maxRV)+" km/h" : "—") +
          statChip("Bilateral Index", isNum(s.bilateral) ? s.bilateral.toFixed(3) : "—") +
        '</div>' +
      '</div>' +

      '<div class="stat-section">' +
        '<h4 class="stat-section-title">Decision Making <span class="pillar-avg">I AVG ' + n1(s.iAvg) + '</span></h4>' +
        '<div class="stat-grid">' +
          scoreChip("Scanning", s.scanning) +
          scoreChip("Decision Speed", s.decisionSpeed) +
          scoreChip("Spatial Play", s.spatialPlay) +
          scoreChip("Positioning", s.positioning) +
        '</div>' +
        '<div class="stat-grid" style="margin-top:8px;">' +
          statChip("Change-of-Direction Intel %", pct1(s.codIntelPct)) +
          statChip("Directional Asymmetry %", pct1(s.dirAsymPct)) +
          statChip("Tactical Economy", isNum(s.tactEcoM) ? n1(s.tactEcoM)+" m" : "—") +
        '</div>' +
      '</div>' +

      '<div class="stat-section">' +
        '<h4 class="stat-section-title">Technical <span class="pillar-avg">T AVG ' + n1(s.tAvg) + '</span></h4>' +
        '<div class="stat-grid">' +
          scoreChip("Ball Control", s.ballControl) +
          scoreChip("Passing", s.passing) +
          scoreChip("Receiving", s.receiving) +
          scoreChip("Dribbling", s.dribbling) +
          scoreChip("Finishing", s.finishing) +
          scoreChip("Both Feet", s.bothFeet) +
        '</div>' +
      '</div>' +

      '<div class="stat-section">' +
        '<h4 class="stat-section-title">Physical <span class="pillar-avg">S AVG ' + n1(s.sAvg) + '</span></h4>' +
        '<div class="stat-grid">' +
          statChip("Total Distance", isNum(s.totalDistM) ? n0(s.totalDistM)+" m" : "—") +
          statChip("Top Speed", isNum(s.topSpeed) ? n1(s.topSpeed)+" km/h" : "—") +
          statChip("Work Rate", isNum(s.workRate) ? n1(s.workRate)+" m/min" : "—") +
          statChip("High-Speed Count", n0(s.hsc)) +
          statChip("Sprints", n0(s.sprints)) +
          statChip("Stride Asymmetry %", pct1(s.strideAsymPct)) +
        '</div>' +
        '<div class="stat-grid" style="margin-top:8px;">' +
          scoreChip("Speed", s.speed) +
          scoreChip("Agility", s.agility) +
          scoreChip("Endurance", s.endurance) +
          scoreChip("Recovery", s.recovery) +
        '</div>' +
      '</div>' +

      '<div class="stat-section">' +
        '<h4 class="stat-section-title">TIPS</h4>' +
        '<div class="tips-overview">' +
          tipsPillar("T", s.tAvg, "Technique") +
          tipsPillar("I", s.iAvg, "Insight") +
          tipsPillar("S", s.sAvg, "Speed") +
        '</div>' +
        '<div class="radar-wrap"><canvas id="radar-' + index + '"></canvas></div>' +
        '<div class="radar-legend">' +
          '<span class="item"><span class="swatch" style="background:#3FFECA"></span>' + esc(s.playerName || "Player") + '</span>' +
          '<span class="item"><span class="swatch" style="background:#8CA89A"></span>Session average</span>' +
        '</div>' +
      '</div>' +

      (isBlank(s.sessionNote) ? "" :
        '<div class="note-block"><span class="k">Session Note</span><p>' + esc(s.sessionNote) + '</p></div>') +
      (isBlank(s.devPriority) ? "" :
        '<div class="note-block priority"><span class="k">Dev Priority</span><p>' + esc(s.devPriority) + '</p></div>');

    return (
      '<div class="session-card" data-open="' + (isOpen ? "true" : "false") + '">' +
        '<button class="session-head" type="button">' +
          '<div class="session-head-main">' +
            '<div class="session-head-top">' +
              '<span>' + esc(formatDate(s.date)) + '</span>' +
              '<span class="sep">·</span>' +
              '<span>' + esc(s.positionPlayed || "—") + '</span>' +
              '<span class="sep">·</span>' +
              '<span>Team ' + esc(s.team || "—") + '</span>' +
              (flags.length ? ' ' + flags.join(' ') : '') +
            '</div>' +
            '<div class="session-head-sub"><span>' + esc(s.session || "") + '</span></div>' +
          '</div>' +
          '<div class="session-score"><div class="v">' + n1(s.tipsScore) + '</div><div class="l">TIPS</div></div>' +
          '<svg class="chevron" viewBox="0 0 24 24" fill="none"><path d="M6 9l6 6 6-6" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>' +
        '</button>' +
        '<div class="session-body"><div class="session-body-inner">' + body + '</div></div>' +
      '</div>'
    );
  }

  function toggleCard(card){
    var body = card.querySelector(".session-body");
    var isOpen = card.getAttribute("data-open") === "true";
    if (isOpen){
      body.style.maxHeight = body.scrollHeight + "px";
      requestAnimationFrame(function(){ body.style.maxHeight = "0px"; });
      card.setAttribute("data-open", "false");
    } else {
      card.setAttribute("data-open", "true");
      body.style.maxHeight = body.scrollHeight + "px";
    }
  }

  function renderChart(sessionsAsc){
    var ctx = document.getElementById("tipsChart").getContext("2d");
    var labels = sessionsAsc.map(sessionLabel);

    var datasets = [
      { key: "tipsScore", label: "Overall", color: "#3FFECA", width: 3 },
      { key: "tAvg", label: "T · Technique", color: "#8FC6FF", width: 2 },
      { key: "iAvg", label: "I · Insight", color: "#C9A6FF", width: 2 },
      { key: "sAvg", label: "S · Speed", color: "#FFC97A", width: 2 }
    ];

    var legend = document.getElementById("chartLegend");
    legend.innerHTML = datasets.map(function(d){
      return '<span class="item"><span class="swatch" style="background:' + d.color + '"></span>' + d.label + '</span>';
    }).join("");

    new Chart(ctx, {
      type: "line",
      data: {
        labels: labels,
        datasets: datasets.map(function(d){
          return {
            label: d.label,
            data: sessionsAsc.map(function(s){ return isNum(s[d.key]) ? s[d.key] : null; }),
            borderColor: d.color,
            backgroundColor: d.color,
            borderWidth: d.width,
            pointRadius: 3.5,
            pointBackgroundColor: d.color,
            pointBorderColor: "#07100A",
            pointBorderWidth: 1.5,
            tension: 0.3,
            spanGaps: true
          };
        })
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { display: false }, tooltip: {
          backgroundColor: "#142519", titleColor: "#EAF7F1", bodyColor: "#EAF7F1",
          borderColor: "rgba(63,254,202,.28)", borderWidth: 1, padding: 10, displayColors: true
        }},
        scales: {
          y: {
            min: 0, max: 10,
            grid: { color: "rgba(63,254,202,.08)" },
            ticks: { color: "#8CA89A", font: { size: 10 }, stepSize: 2 }
          },
          x: {
            grid: { display: false },
            ticks: { color: "#8CA89A", font: { size: 10 }, maxRotation: 0, autoSkip: true }
          }
        }
      }
    });
  }

  // Per-session radar: this player's T/I/S for that session vs the average
  // of every TF- player who trained in that same session (session cohort).
  function renderSessionRadars(sessionsDesc, sessionAverages){
    sessionsDesc.forEach(function(s, i){
      var canvas = document.getElementById("radar-" + i);
      if (!canvas || typeof Chart === "undefined") return;
      var teamAvg = sessionAverages[s.session] || {};

      new Chart(canvas.getContext("2d"), {
        type: "radar",
        data: {
          labels: ["Technique", "Insight", "Speed"],
          datasets: [
            {
              label: s.playerName || "Player",
              data: [s.tAvg, s.iAvg, s.sAvg],
              borderColor: "#3FFECA", backgroundColor: "rgba(63,254,202,.18)",
              pointBackgroundColor: "#3FFECA", pointBorderColor: "#07100A",
              borderWidth: 2, pointRadius: 3
            },
            {
              label: "Session average" + (isNum(teamAvg.n) ? " (n=" + teamAvg.n + ")" : ""),
              data: [teamAvg.tAvg, teamAvg.iAvg, teamAvg.sAvg],
              borderColor: "#8CA89A", backgroundColor: "rgba(140,168,154,.10)",
              pointBackgroundColor: "#8CA89A", pointBorderColor: "#07100A",
              borderWidth: 1.5, borderDash: [4, 3], pointRadius: 2.5
            }
          ]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: {
            legend: { display: false },
            tooltip: {
              backgroundColor: "#142519", titleColor: "#EAF7F1", bodyColor: "#EAF7F1",
              borderColor: "rgba(63,254,202,.28)", borderWidth: 1
            }
          },
          scales: {
            r: {
              min: 0, max: 10,
              ticks: { display: false, stepSize: 2, backdropColor: "transparent" },
              grid: { color: "rgba(63,254,202,.12)" },
              angleLines: { color: "rgba(63,254,202,.12)" },
              pointLabels: { color: "#8CA89A", font: { size: 10.5 } }
            }
          }
        }
      });
    });
  }

  // "Your Development" — dual-axis trend lines pairing an objective
  // PlayerMaker sensor metric with its related coach-scored TIPS criterion.
  // Gated behind a 2-session minimum so a single point never renders as a chart.
  function renderDevSection(sessionsAsc){
    var el = document.getElementById("devCard");

    if (sessionsAsc.length < 2){
      el.innerHTML =
        '<div class="dev-empty">' +
          '<svg viewBox="0 0 24 24" fill="none"><path d="M3 17l6-6 4 4 8-8" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M15 7h6v6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>' +
          '<p class="dev-empty-title">Development charts appear after session 2</p>' +
          '<p class="dev-empty-sub">Every session adds a point to your charts. Two-footedness, ball control under pressure, and movement symmetry — tracked over time so you can see whether the work is showing.</p>' +
          '<span class="dev-empty-progress">' + sessionsAsc.length + ' of 2 sessions logged</span>' +
        '</div>';
      return;
    }

    el.innerHTML =
      '<div class="dev-metric">' +
        '<div class="dev-metric-head"><span class="dev-metric-title">Two-Footedness</span><span class="dev-metric-sub">Weak-foot usage % · Both Feet score</span></div>' +
        '<div class="chart-wrap small"><canvas id="dev-bilateral"></canvas></div>' +
      '</div>' +
      '<div class="dev-metric">' +
        '<div class="dev-metric-head"><span class="dev-metric-title">Ball Control Under Pressure</span><span class="dev-metric-sub">Control on Release % · Ball Control score</span></div>' +
        '<div class="chart-wrap small"><canvas id="dev-control"></canvas></div>' +
      '</div>' +
      '<div class="dev-metric">' +
        '<div class="dev-metric-head"><span class="dev-metric-title">Movement Symmetry</span><span class="dev-metric-sub">Stride Asymmetry %</span></div>' +
        '<div class="chart-wrap small"><canvas id="dev-gait"></canvas></div>' +
      '</div>';

    if (typeof Chart === "undefined") return;
    var labels = sessionsAsc.map(sessionLabel);
    var baseScales = function(leftMax, leftLabelIsPct){
      return {
        yLeft: {
          position: "left", min: 0, max: leftMax,
          grid: { color: "rgba(63,254,202,.08)" },
          ticks: { color: "#8CA89A", font: { size: 9 }, callback: function(v){ return leftLabelIsPct ? v + "%" : v; } }
        },
        yRight: {
          position: "right", min: 0, max: 10,
          grid: { display: false },
          ticks: { color: "#8CA89A", font: { size: 9 } }
        },
        x: { grid: { display: false }, ticks: { color: "#8CA89A", font: { size: 9 }, maxRotation: 0, autoSkip: true } }
      };
    };
    var legendOpt = { display: true, position: "bottom", labels: { color: "#8CA89A", boxWidth: 9, font: { size: 9.5 }, padding: 10 } };
    var tooltipOpt = {
      backgroundColor: "#142519", titleColor: "#EAF7F1", bodyColor: "#EAF7F1",
      borderColor: "rgba(63,254,202,.28)", borderWidth: 1
    };

    // 1. Two-footedness: weak-foot usage % vs Both Feet TIPS score
    new Chart(document.getElementById("dev-bilateral").getContext("2d"), {
      type: "line",
      data: {
        labels: labels,
        datasets: [
          {
            label: "Weak-Foot Usage %", yAxisID: "yLeft",
            data: sessionsAsc.map(function(s){ return (isNum(s.leftPct) && isNum(s.rightPct)) ? Math.min(s.leftPct, s.rightPct) : null; }),
            borderColor: "#8FC6FF", backgroundColor: "#8FC6FF", pointRadius: 3, tension: 0.3, spanGaps: true
          },
          {
            label: "Both Feet Score", yAxisID: "yRight",
            data: sessionsAsc.map(function(s){ return isNum(s.bothFeet) ? s.bothFeet : null; }),
            borderColor: "#3FFECA", backgroundColor: "#3FFECA", pointRadius: 3, tension: 0.3, spanGaps: true, borderDash: [5, 3]
          }
        ]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: legendOpt, tooltip: tooltipOpt },
        scales: baseScales(50, true)
      }
    });

    // 2. Ball control under pressure: Control on Release % vs Ball Control score
    new Chart(document.getElementById("dev-control").getContext("2d"), {
      type: "line",
      data: {
        labels: labels,
        datasets: [
          {
            label: "Control on Release %", yAxisID: "yLeft",
            data: sessionsAsc.map(function(s){ return isNum(s.ctrlReleasePct) ? s.ctrlReleasePct : null; }),
            borderColor: "#C9A6FF", backgroundColor: "#C9A6FF", pointRadius: 3, tension: 0.3, spanGaps: true
          },
          {
            label: "Ball Control Score", yAxisID: "yRight",
            data: sessionsAsc.map(function(s){ return isNum(s.ballControl) ? s.ballControl : null; }),
            borderColor: "#3FFECA", backgroundColor: "#3FFECA", pointRadius: 3, tension: 0.3, spanGaps: true, borderDash: [5, 3]
          }
        ]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: legendOpt, tooltip: tooltipOpt },
        scales: baseScales(100, true)
      }
    });

    // 3. Movement symmetry: Stride Asymmetry % (points highlighted red when Gait Flag = YES)
    var strideVals = sessionsAsc.map(function(s){ return isNum(s.strideAsymPct) ? s.strideAsymPct : null; });
    var flagged = sessionsAsc.map(function(s){ return s.gaitFlag === "YES"; });
    new Chart(document.getElementById("dev-gait").getContext("2d"), {
      type: "line",
      data: {
        labels: labels,
        datasets: [{
          label: "Stride Asymmetry %",
          data: strideVals,
          borderColor: "#FFC97A", backgroundColor: "#FFC97A",
          pointBackgroundColor: flagged.map(function(f){ return f ? "#FF6B6B" : "#FFC97A"; }),
          pointRadius: flagged.map(function(f){ return f ? 5.5 : 3; }),
          tension: 0.3, spanGaps: true
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false }, tooltip: tooltipOpt },
        scales: {
          y: { beginAtZero: true, grid: { color: "rgba(63,254,202,.08)" }, ticks: { color: "#8CA89A", font: { size: 9 }, callback: function(v){ return v + "%"; } } },
          x: { grid: { display: false }, ticks: { color: "#8CA89A", font: { size: 9 }, maxRotation: 0, autoSkip: true } }
        }
      }
    });
    if (flagged.some(Boolean)){
      document.querySelector('#dev-gait').closest(".dev-metric").insertAdjacentHTML(
        "beforeend", '<p class="dev-flag-note">Red points mark sessions with a gait flag.</p>'
      );
    }
  }

  function renderHeader(latest){
    document.getElementById("playerHeader").style.display = "flex";
    document.getElementById("avatarInitial").textContent = (latest.playerName || "?").charAt(0).toUpperCase();
    document.getElementById("playerName").textContent = latest.playerName || latest.playerId;

    var metaParts = [
      '<span class="pid">' + esc(latest.playerId) + '</span>',
      esc(latest.primaryPosition || latest.positionPlayed || "—"),
      "Team " + esc(latest.team || "—")
    ];
    document.getElementById("playerMeta").innerHTML = metaParts.join(' <span class="sep">·</span> ');
    document.getElementById("heroScore").textContent = n1(latest.tipsScore);
  }

  function render(sessions, allSessions){
    document.getElementById("loadingState").style.display = "none";

    if (!sessions.length){
      var id = qs("id");
      document.getElementById("emptyState").style.display = "block";
      document.getElementById("emptyState").textContent = id
        ? "No sessions found for " + id + "."
        : "Add ?id=PLAYER-ID to the URL to view a player passport.";
      return;
    }

    var sessionsDesc = sessions.slice().sort(function(a, b){
      return (b.date ? b.date.getTime() : 0) - (a.date ? a.date.getTime() : 0);
    });
    var sessionsAsc = sessions.slice().sort(function(a, b){
      return (a.date ? a.date.getTime() : 0) - (b.date ? b.date.getTime() : 0);
    });

    renderHeader(sessionsDesc[0]);

    document.getElementById("content").style.display = "block";
    var listEl = document.getElementById("sessionList");
    listEl.innerHTML = sessionsDesc.map(function(s, i){ return buildSessionCard(s, i === 0, i); }).join("");

    var cards = listEl.querySelectorAll(".session-card");
    cards.forEach(function(card, i){
      var body = card.querySelector(".session-body");
      if (i === 0){ body.style.maxHeight = body.scrollHeight + "px"; }
      card.querySelector(".session-head").addEventListener("click", function(){ toggleCard(card); });
    });

    renderChart(sessionsAsc);
    renderSessionRadars(sessionsDesc, computeSessionAverages(allSessions || sessions));
    renderDevSection(sessionsAsc);
  }

  // ---------------------------------------------------------------
  // INIT
  // ---------------------------------------------------------------
  function init(){
    var id = qs("id");
    if (!id){
      render([]);
      return;
    }
    loadSheet(function(json){
      var all = parseTable(json);
      var matched = all.filter(function(s){
        return s.playerId && s.playerId.toLowerCase() === id.toLowerCase();
      });
      render(matched, all);
    }, function(){
      document.getElementById("loadingState").style.display = "none";
      var el = document.getElementById("emptyState");
      el.style.display = "block";
      el.textContent = "Could not load player data. Please try again shortly.";
    });
  }

  init();
})();
</script>
</body>
</html>
